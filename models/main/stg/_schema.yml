version: 2

models:
  - name: stg_all_manifests
    description: 全データセットの manifest.json を UNION ALL (1 row/dataset)
  - name: stg_all_catalogs
    description: 全データセットの catalog.json を UNION ALL
  - name: stg_all_metas
    description: 全データセットの fdl.toml メタデータ JSON を UNION ALL

  - name: stg_datasets
    description: fdl.toml + manifest.metadata を統合
  - name: stg_dataset_schemas
    description: 各データセットのスキーマ一覧
  - name: stg_dataset_dependencies
    description: データセット間依存関係（未実装、空）

  - name: stg_nodes
    description: manifest.nodes の全 resource_type を1行1ノードに展開
  - name: stg_columns
    description: manifest columns + catalog 型情報を結合
  - name: stg_sources
    description: manifest.sources を展開
  - name: stg_lineage_edges
    description: manifest.parent_map を edge リストに展開

  - name: stg_semantic_models
    description: manifest.semantic_models を1行1semantic model に展開 (raw JSON 保持)
  - name: stg_semantic_entities
    description: semantic_models.entities を展開
  - name: stg_semantic_dimensions
    description: semantic_models.dimensions を展開
  - name: stg_semantic_measures
    description: semantic_models.measures を展開
